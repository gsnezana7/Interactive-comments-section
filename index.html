<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Interactive comments section</title>
    <link rel="stylesheet" href="normalize.css" />
    <link rel="stylesheet" href="style.css" />
    <script defer src="./main.js"></script>
  </head>

  <body>
    <!-- 1. Главный контейнер для всей страницы -->
    <main class="comments-wrapper container"></main>

    <footer class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Snezana</a>.
    </footer>
    <!-- Модальное окно подтверждения удаления -->
    <div class="modal-overlay modal-overlay--hidden">
      <div class="modal-box">
        <h2 class="modal-box__title">Delete comment</h2>
        <p class="modal-box__text">
          Are you sure you want to delete this comment? This will remove the
          comment and can't be undone.
        </p>
        <div class="modal-box__actions">
          <button
            type="button"
            class="modal-box__btn modal-box__btn--cancel btn-reset"
          >
            NO, CANCEL
          </button>
          <button
            type="button"
            class="modal-box__btn modal-box__btn--confirm btn-reset"
          >
            YES, DELETE
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
